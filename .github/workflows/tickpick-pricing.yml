name: TickPick Pricing

on:
  schedule:
    # 6x daily, every 4 hours, to keep TickPick prices within ~4h of fresh
    - cron: '0 2 * * *'   # 2 AM UTC  (10 PM EDT / 7 PM PDT prev day)
    - cron: '0 6 * * *'   # 6 AM UTC  (2 AM EDT  / 11 PM PDT prev day)
    - cron: '0 10 * * *'  # 10 AM UTC (6 AM EDT  / 3 AM PDT)
    - cron: '0 14 * * *'  # 2 PM UTC  (10 AM EDT / 7 AM PDT)
    - cron: '0 18 * * *'  # 6 PM UTC  (2 PM EDT  / 11 AM PDT)
    - cron: '0 22 * * *'  # 10 PM UTC (6 PM EDT  / 3 PM PDT)
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape-and-rescore:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Scrape TickPick pricing
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/scrape-prices.ts

      - name: Rescore games with fresh pricing
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/rescore.ts
